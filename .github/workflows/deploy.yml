name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22' # LTS; engines allow ^20.19.0 || ^22.0.0

    - name: Install dependencies
      run: yarn install --frozen-lockfile

    - name: Build project
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      run: npm run build

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ github.ref == 'refs/heads/main' && 'garden-steward' || 'garden-steward' }}

    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    - name: Deploy to Firebase Hosting
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
      run: |
        set -o pipefail
        npm run build
        # Firebase 400s if the built output is identical to the currently-live
        # version ("supplied version ... is the current active version"). That's
        # a no-op, not a failure — treat it as success so CI stays green.
        if firebase deploy --only hosting:garden-steward --project garden-steward 2>&1 | tee firebase-deploy.log; then
          echo "Firebase deploy succeeded."
        elif grep -q "is the current active version" firebase-deploy.log; then
          echo "::notice::No hosting changes since the last deploy (version already live) — skipping."
        else
          echo "::error::Firebase deploy failed."
          exit 1
        fi
      
    - name: Log Deployment Success
      run: echo "Deployment to Firebase Hosting was successful!"

